<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLACINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="./assets/css/output.css" rel="stylesheet">
</head>

<body>
    <header class="py-4 fixed w-full z-10">
        <div class="container mx-auto px-5 sm:px-0 flex items-center justify-between">
            <div class="mr-10 md:hidden">
                <a href="./landing.html"><img src="./assets/img/logo/Mini Logo.svg" /></a>
            </div>
            <div class="flex items-center">
                <div class="mr-10 hidden md:block hover:scale-110 transition">
                    <a href="./landing.html"><img src="./assets/img/logo/logo.svg" /></a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section>
            <div class="relative h-screen">
                <div class="absolute inset-0 bg-[url('./../img/public/Sign-In-Bg.webp')] bg-cover bg-center opacity-15">
                </div>
                <div class="container mx-auto h-full px-5 sm:px-0">
                    <div class="relative flex flex-col items-center justify-center h-full gap-12">
                        <div class="flex flex-col items-center">
                            <h1 class="font-headers font-bold text-3xl md:text-5xl">Who is watching?</h1>
                            <p class="font-light text-[18px] text-[#F1F4FD]">Tailor your movie streaming experience by
                                setting up dedicated profiles for each viewer</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                            <div class="flex flex-col items-center gap-2">
                                <p class="text-primary text-[18px]">Amy</p>
                                <div class="relative group  hover:scale-105 transition">
                                    <a href="./account.html"><img src="./assets/img/people/Amy.webp" />
                                        <img src="./assets/img/icons/pencil.svg" class="absolute bg-[#1D2128] p-2 rounded-full left-1/2 -translate-x-1/2 -translate-y-1/2
                             opacity-0 group-hover:opacity-100"></a>
                                </div>
                            </div>
                            <div class="flex flex-col items-center gap-2">
                                <p class="text-primary text-[18px]">Jhon</p>
                                <div class="relative group  hover:scale-105 transition">
                                    <a href="./account.html"><img src="./assets/img/people/Jhon.webp" />
                                        <img src="./assets/img/icons/pencil.svg" class="absolute bg-[#1D2128] p-2 rounded-full left-1/2 -translate-x-1/2 -translate-y-1/2
                             opacity-0 group-hover:opacity-100"></a>
                                </div>
                            </div>
                            <div class="flex flex-col items-center gap-2">
                                <p class="text-primary text-[18px]">Boom</p>
                                <div class="relative group  hover:scale-105 transition">
                                    <a href="./account.html"><img src="./assets/img/people/Boom.webp" />
                                        <img src="./assets/img/icons/pencil.svg" class="absolute bg-[#1D2128] p-2 rounded-full left-1/2 -translate-x-1/2 -translate-y-1/2
                             opacity-0 group-hover:opacity-100"></a>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col items-center">
                            <button class="bg-theme p-1.5 rounded-full hover:scale-110 transition"><img
                                    src="./assets/img/icons/add.svg" /></button>
                            <button class="text-primary text-[18px] mt-2 hover:scale-110 transition">Add New
                                Profile</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
