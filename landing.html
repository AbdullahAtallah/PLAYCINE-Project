<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLACINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="./assets/css/output.css" rel="stylesheet">
</head>

<body>

    <header class="py-4 fixed w-full z-10">
        <div class="container mx-auto px-5 sm:px-0 flex items-center justify-between">
            <div class="mr-10 md:hidden">
                <a href="./landing.html"><img src="./assets/img/logo/Mini Logo.svg" /></a>
            </div>
            <div class="flex items-center">
                <div class="mr-10 hidden md:block hover:scale-110 transition">
                    <a href="./landing.html"><img src="./assets/img/logo/logo.svg" /></a>
                </div>

            </div>
            <div class="flex items-center gap-6.25">
                <button class="py-2 px-3 text-xs hover:scale-110 transition">
                    Sign In
                </button>
                <button class="py-2 px-3 rounded-[22px] border hover:scale-110 transition bg-white text-black text-xs">
                    Join PlayCine
                </button>
            </div>
        </div>
    </header>

    <main>
        <section>
            <div class="relative h-screen">
                <div class="absolute inset-0 bg-[url('./../img/public/stars.webp')] bg-cover bg-center"></div>
                <div class="container mx-auto h-full px-5 sm:px-0">
                    <div class="relative flex flex-col h-full items-center justify-center text-center gap-2">
                        <h1 class="font-headers font-semibold text-3xl md:text-5xl mt-12">Igniting Your Passion for
                            Movies,<br />
                            Unleashing Wonder!</h1>
                        <p class="font-light text-[#F1F4FD] mt-2">Welcome to PLAYCINE, where the silver screen comes
                            alive, offering a captivating web app<br />
                            experience that fuels your love for movies.</p>
                        <button class=" bg-theme mb-12 py-2 px-3 rounded-[22px] hover:scale-110 transition">
                            <a href="./index.html">Discover PlayCine</a>
                        </button>
                        <div class="bg-[#1D2128] relative overflow-hidden rounded-lg p-10">
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/Poison.webp" class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/Sport Car.webp"
                                            class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/Mid Town.webp "
                                            class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/Ascend.webp" class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/Agent.webp" class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/One Night For Love.webp"
                                            class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/Morbius.webp "
                                            class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                                <div class="relative group hover:opacity-60 hover:scale-105 transition">
                                    <a href="#"><img src="./assets/img/Movies/World Distruction .webp"
                                            class=" rounded-lg w-full" />
                                        <i class="fa-solid fa-circle-play text-theme absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl
                             opacity-0 group-hover:opacity-100"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>
</body>

</html>
