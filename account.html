<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLACINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="./assets/css/output.css" rel="stylesheet">
</head>

<body>
    <header class="py-4 fixed w-full z-10">
        <div class="container mx-auto px-5 sm:px-0 flex items-center justify-between">
            <div class="mr-10 md:hidden">
                <a href="./landing.html"><img src="./assets/img/logo/Mini Logo.svg" /></a>
            </div>
            <div class="flex items-center">
                <div class="mr-10 hidden md:block hover:scale-110 transition">
                    <a href="./landing.html"><img src="./assets/img/logo/logo.svg" /></a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section>
            <div class="relative h-screen">
                <div class="absolute inset-0 bg-[url('./../img/public/Sign-In-Bg.webp')] bg-cover bg-center opacity-15">
                </div>
                <div class="container mx-auto h-full px-5 sm:px-0">
                    <div class="relative flex items-center justify-center h-full gap-12">
                        <div class="flex flex-col items-center text-center">
                            <h1 class="font-headers font-bold text-3xl md:text-5xl">Your profile</h1>
                            <p class="font-light text-[18px] text-[#F1F4FD]">Customize your profile for personalized
                                movie recommendations.</p>
                        </div>
                        <div class="bg-[#1D2128] relative rounded-lg p-10 flex flex-col md:flex-row gap-9">
                            <div class="relative group">
                                <img src="./assets/img/people/Amy.webp" />
                                <img src="./assets/img/icons/Camera.svg" class="absolute bg-[#45474a] p-2 rounded-full left-1/2 -translate-x-1/2 -translate-y-1/2
                             opacity-100">
                            </div>
                            <div>
                                <form class="space-y-5">
                                    <div>
                                        <label class="text-sm text-[#A7ADB7] mb-1">Full name</label>
                                        <input type="text" placeholder="Your full name"
                                            class="w-full px-4 py-2 bg-[#333537] rounded-md text-primary placeholder-[#BCC1CA]">
                                    </div>
                                    <div>
                                        <label class="text-sm text-[#A7ADB7] mb-1">Email</label>
                                        <input type="email" placeholder="Your email"
                                            class="w-full px-4 py-2 bg-[#333537] rounded-md text-primary placeholder-[#BCC1CA]">
                                    </div>
                                    <div>
                                        <label class="text-sm text-[#A7ADB7] mb-1">Phone number</label>
                                        <input type="text" placeholder="Your phone number"
                                            class="w-full px-4 py-2 bg-[#333537] rounded-md text-primary placeholder-[#BCC1CA]">
                                    </div>
                                    <div>
                                        <label class="text-sm text-[#A7ADB7] mb-1">Location</label>
                                        <select
                                            class="w-full px-4 py-2 bg-[#333537] rounded-md text-[#BCC1CA]">
                                            <option  value= disabled selected hidden>-Select your country-</option>
                                            <option>Palestine</option>
                                            <option>Jordan</option>
                                            <option>UAE</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="text-sm text-[#A7ADB7] mb-1">About me</label>
                                        <textarea rows="3" placeholder="Tell something about yourself"
                                            class="w-full px-4 py-2 bg-[#333537] rounded-md text-primary placeholder-[#BCC1CA]"></textarea>
                                    </div>

                                    <!-- Buttons -->
                                    <div class="flex justify-end items-center gap-4 pt-4">
                                        <button type="button" class="text-[#BCC1CA] hover:text-primary">
                                            Cancel
                                        </button>
                                        <button type="submit"
                                            class="bg-theme hover:bg-red-700 text-primary px-5 py-2 rounded-full transition">
                                            Save profile
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
